openapi: 3.0.0
info:
  title: NexusHub Events API
  description: RESTful API for community event management with Google OAuth authentication.
  version: 1.0.0
  contact:
    name: Team NexusHub
  license:
    name: MIT

servers:
  - url: https://nexushub-events-api.onrender.com
    description: Production server on Render

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Session cookie set after Google login

  schemas:
    User:
      type: object
      properties:
        _id: { type: string }
        googleId: { type: string }
        email: { type: string }
        displayName: { type: string }
        avatar: { type: string }
        role: { type: string, enum: [user, organizer] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    
    Event:
      type: object
      required: [title, description, date, location, maxAttendees]
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        category: { type: string, enum: [Tech, Music, Business, Workshop, Social, Other], default: Other }
        date: { type: string, format: date-time }
        location: { type: string }
        maxAttendees: { type: integer, minimum: 1 }
        currentAttendees: { type: integer, default: 0 }
        organizer:
          type: object
          properties:
            _id: { type: string }
            displayName: { type: string }
            email: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    
    Registration:
      type: object
      properties:
        _id: { type: string }
        user:
          type: object
          properties:
            _id: { type: string }
            displayName: { type: string }
        event:
          type: object
          properties:
            _id: { type: string }
            title: { type: string }
        status: { type: string, enum: [confirmed, cancelled], default: confirmed }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    
    Review:
      type: object
      required: [rating]
      properties:
        _id: { type: string }
        user:
          type: object
          properties:
            _id: { type: string }
            displayName: { type: string }
            avatar: { type: string }
        event: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    
    Category:
      type: object
      required: [name]
      properties:
        _id: { type: string }
        name: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    
    Error:
      type: object
      properties:
        message: { type: string }

  parameters:
    eventId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Event ID
    userId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: User ID
    regId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Registration ID
    reviewId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Review ID
    categoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Category ID

paths:
  # ================ AUTHENTICATION ================
  /auth/google:
    get:
      summary: Initiate Google OAuth login
      description: Redirects to Google login page. After success, redirects to /dashboard.
      responses:
        302:
          description: Redirect to Google
  
  /auth/google/callback:
    get:
      summary: Google OAuth callback
      description: Internal endpoint handled by Passport.
      responses:
        302:
          description: Redirect to dashboard
  
  /auth/logout:
    get:
      summary: Logout current user
      responses:
        200:
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  
  /auth/current-user:
    get:
      summary: Get currently logged in user
      responses:
        200:
          description: User data or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    nullable: true

  # ================ EVENTS ================
  /events:
    get:
      summary: Get all events
      responses:
        200:
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
    
    post:
      summary: Create a new event
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, date, location, maxAttendees]
              properties:
                title: { type: string }
                description: { type: string }
                category: { type: string, enum: [Tech, Music, Business, Workshop, Social, Other] }
                date: { type: string, format: date-time }
                location: { type: string }
                maxAttendees: { type: integer }
      responses:
        201:
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        400:
          description: Validation error
        401:
          description: Not logged in
        403:
          description: User is not an organizer
  
  /events/{id}:
    get:
      summary: Get event by ID
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        200:
          description: Event found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        404:
          description: Event not found
    
    put:
      summary: Update event (only organizer who created it)
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/eventId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                category: { type: string }
                date: { type: string, format: date-time }
                location: { type: string }
                maxAttendees: { type: integer }
      responses:
        200:
          description: Event updated
        401:
          description: Not logged in
        403:
          description: Not the owner
        404:
          description: Event not found
    
    delete:
      summary: Delete event (only organizer who created it)
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        200:
          description: Event deleted
        401:
          description: Not logged in
        403:
          description: Not the owner
        404:
          description: Event not found

  # ================ USERS ================
  /users:
    get:
      summary: Get all users
      responses:
        200:
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  
  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        200:
          description: User found
        404:
          description: User not found
    
    put:
      summary: Update own user profile
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                avatar: { type: string }
      responses:
        200:
          description: User updated
        401:
          description: Not logged in
        403:
          description: Can only edit own profile
    
    delete:
      summary: Delete own account
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        200:
          description: User deleted
        401:
          description: Not logged in
        403:
          description: Can only delete own account

  # ================ REGISTRATIONS ================
  /registrations:
    get:
      summary: Get all registrations for the logged-in user
      security:
        - cookieAuth: []
      responses:
        200:
          description: List of registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Registration'
        401:
          description: Not logged in
    
    post:
      summary: Register logged-in user for an event
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventId]
              properties:
                eventId: { type: string }
      responses:
        201:
          description: Registered successfully
        400:
          description: Already registered or event full
        401:
          description: Not logged in
        404:
          description: Event not found
  
  /registrations/{id}:
    get:
      summary: Get a specific registration by ID
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/regId'
      responses:
        200:
          description: Registration found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
        401:
          description: Not logged in
        404:
          description: Registration not found
    
    put:
      summary: Update registration status (confirmed/cancelled)
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/regId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [confirmed, cancelled] }
      responses:
        200:
          description: Registration updated
        400:
          description: Invalid status
        401:
          description: Not logged in
        403:
          description: Not your registration
        404:
          description: Registration not found
    
    delete:
      summary: Cancel a registration
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/regId'
      responses:
        200:
          description: Cancelled
        401:
          description: Not logged in
        403:
          description: Not your registration
        404:
          description: Registration not found

  # ================ REVIEWS ================
  /reviews/event/{eventId}:
    get:
      summary: Get all reviews for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
  
  /reviews:
    post:
      summary: Create a review for an event
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventId, rating]
              properties:
                eventId: { type: string }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
      responses:
        201:
          description: Review created
        400:
          description: Already reviewed or invalid rating
        401:
          description: Not logged in
  
  /reviews/{id}:
    get:
      summary: Get a review by ID
      parameters:
        - $ref: '#/components/parameters/reviewId'
      responses:
        200:
          description: Review found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        404:
          description: Review not found
    
    put:
      summary: Update own review
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/reviewId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
      responses:
        200:
          description: Review updated
        401:
          description: Not logged in
        403:
          description: Not your review
        404:
          description: Review not found
    
    delete:
      summary: Delete own review
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/reviewId'
      responses:
        200:
          description: Review deleted
        401:
          description: Not logged in
        403:
          description: Not your review
        404:
          description: Review not found

  # ================ CATEGORIES ================
  /categories:
    get:
      summary: Get all categories
      responses:
        200:
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    
    post:
      summary: Create a new category
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        201:
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        400:
          description: Validation error or duplicate name
        401:
          description: Not logged in
        403:
          description: User is not an organizer
  
  /categories/{id}:
    get:
      summary: Get category by ID
      parameters:
        - $ref: '#/components/parameters/categoryId'
      responses:
        200:
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        404:
          description: Category not found
    
    put:
      summary: Update category (only organizer)
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/categoryId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        200:
          description: Category updated
        400:
          description: Duplicate name or validation error
        401:
          description: Not logged in
        403:
          description: User is not an organizer
        404:
          description: Category not found
    
    delete:
      summary: Delete category (only organizer)
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/categoryId'
      responses:
        200:
          description: Category deleted
        401:
          description: Not logged in
        403:
          description: User is not an organizer
        404:
          description: Category not found